<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Gestor de Tareas</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/login.css" />
</head>

<body>
    <nav class="navbar">
        <h2>Gestor de Tareas</h2>
    </nav>

    <main class="auth-container">
        <h1>Bienvenido</h1>
        <p class="login-subtitle">Inicia sesión o regístrate para ver tus tareas</p>

        <input type="email" id="email" placeholder="Correo electrónico">
        <div id="email-error" class="input-error" style="margin-top: -10px; margin-bottom: 15px; text-align: left;">
            <svg fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd"></path>
            </svg>
            <span>Falta ingresar el correo</span>
        </div>

        <input type="password" id="password" placeholder="Contraseña">
        <div id="password-error" class="input-error" style="margin-top: -10px; margin-bottom: 20px; text-align: left;">
            <svg fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd"></path>
            </svg>
            <span>Falta ingresar la contraseña</span>
        </div>

        <button id="login-btn">Iniciar sesión</button>
        <button id="register-btn" class="btn-secondary">Registrarse</button>

        <div id="error-msg" class="input-error" style="justify-content: center; margin-top: 15px;">
            <svg fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd"></path>
            </svg>
            <span id="error-text">Error al iniciar sesión</span>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
