<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Gestor de Tareas</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/login.css" />
</head>

<body>
    <nav class="navbar">
        <h2>Gestor de Tareas</h2>
    </nav>

    <main class="auth-container">
        <h1>Bienvenido</h1>
        <p class="login-subtitle">Inicia sesión o regístrate para ver tus tareas</p>

        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">

        <button id="login-btn">Iniciar Sesión</button>
        <button id="register-btn" class="btn-secondary">Registrarse</button>

        <p id="error-msg" class="error-message">Error al iniciar sesión</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
