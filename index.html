<!doctype html>
<html>

<head>
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

    <nav class="navbar">
        <h2>Gestor de Tareas</h2>
        <div class="user-info" id="user-info" style="display: none;">
            <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Avatar" id="user-avatar"
                class="avatar">
            <span id="user-email" class="user-email"></span>
            <button id="logout-btn" class="logout-btn" title="Cerrar sesión">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                    </path>
                </svg>
                <span class="logout-text">Salir</span>
            </button>
        </div>
    </nav>


    <main class="container">
        <h1>Mis Tareas</h1>

        <div class="input-group">
            <input type="text" placeholder="Ingresa una nueva tarea" />
            <button>Agregar</button>
        </div>
        <div id="error-message" class="input-error">
            <svg fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd"></path>
            </svg>
            <span>Falta llenar este campo</span>
        </div>

        <div id="loader" class="loader" style="display: none;">Cargando tareas...</div>
        <ul id="tasks"></ul>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
